spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/tby_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 30
    cache-enabled: false

pagehelper:
  helper-dialect: mysql
  reasonable: true        # page < 1 自動修正為第 1 頁，page > totalPages 自動修正為最後一頁
  support-methods-arguments: true

server:
  port: 8080

logging:
  level:
    com.tby.api.mapper: DEBUG
